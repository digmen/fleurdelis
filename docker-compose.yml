services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleurdelis-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - fleurdelis

  nginx:
    image: nginx:1.27-alpine
    container_name: fleurdelis-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - fleurdelis

networks:
  fleurdelis:
    driver: bridge
