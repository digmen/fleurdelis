upstream nextjs_upstream {
    server web:3000;
    keepalive 64;
}

# HTTP — используется для ACME-челленджа certbot и редиректа на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name fleurdelis-club.site www.fleurdelis-club.site;

    # для certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ПОКА НЕТ сертификата — проксируем трафик напрямую.
    # После получения сертификата: закомментируй блок ниже
    # и раскомментируй `return 301 ...`.
    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://nextjs_upstream;
    }

    # location / {
    #     return 301 https://$host$request_uri;
    # }
}

